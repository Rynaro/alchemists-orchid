<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      .title { font-family: system-ui, sans-serif; font-weight: 600; }
      .label { font-family: system-ui, sans-serif; font-size: 11px; }
      .hex { font-family: monospace; font-size: 10px; }
      .mode-title { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 600; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#E8A4CC" class="title" font-size="24">
    🌸 Alchemist's Orchid v2.0
  </text>
  <text x="400" y="60" text-anchor="middle" fill="#E5E9F0" class="label" font-size="12">
    Astigmatism-Optimized Color Palette
  </text>
  
  <!-- Dark Mode Section -->
  <g transform="translate(30, 90)">
    <text x="110" y="0" text-anchor="middle" fill="#E5E9F0" class="mode-title">🌙 Dark Mode</text>
    
    <!-- Background/Foreground -->
    <rect x="0" y="15" width="100" height="50" rx="6" fill="#2E3440"/>
    <text x="50" y="45" text-anchor="middle" fill="#E5E9F0" class="label">Background</text>
    <text x="50" y="58" text-anchor="middle" fill="#81A1C1" class="hex">#2E3440</text>
    
    <rect x="110" y="15" width="100" height="50" rx="6" fill="#E5E9F0"/>
    <text x="160" y="45" text-anchor="middle" fill="#2E3440" class="label">Foreground</text>
    <text x="160" y="58" text-anchor="middle" fill="#4C566A" class="hex">#E5E9F0</text>
    
    <!-- Syntax Colors Row 1 -->
    <rect x="0" y="75" width="65" height="45" rx="4" fill="#E8A4CC"/>
    <text x="32" y="95" text-anchor="middle" fill="#2E3440" class="label">Pink</text>
    <text x="32" y="112" text-anchor="middle" fill="#2E3440" class="hex">#E8A4CC</text>
    
    <rect x="72" y="75" width="65" height="45" rx="4" fill="#C89BD0"/>
    <text x="104" y="95" text-anchor="middle" fill="#2E3440" class="label">Purple</text>
    <text x="104" y="112" text-anchor="middle" fill="#2E3440" class="hex">#C89BD0</text>
    
    <rect x="144" y="75" width="65" height="45" rx="4" fill="#A3BE8C"/>
    <text x="176" y="95" text-anchor="middle" fill="#2E3440" class="label">Green</text>
    <text x="176" y="112" text-anchor="middle" fill="#2E3440" class="hex">#A3BE8C</text>
    
    <!-- Syntax Colors Row 2 -->
    <rect x="0" y="128" width="65" height="45" rx="4" fill="#81A1C1"/>
    <text x="32" y="148" text-anchor="middle" fill="#2E3440" class="label">Blue</text>
    <text x="32" y="165" text-anchor="middle" fill="#2E3440" class="hex">#81A1C1</text>
    
    <rect x="72" y="128" width="65" height="45" rx="4" fill="#DFCA9A"/>
    <text x="104" y="148" text-anchor="middle" fill="#2E3440" class="label">Yellow</text>
    <text x="104" y="165" text-anchor="middle" fill="#2E3440" class="hex">#DFCA9A</text>
    
    <rect x="144" y="128" width="65" height="45" rx="4" fill="#8FBCBB"/>
    <text x="176" y="148" text-anchor="middle" fill="#2E3440" class="label">Cyan</text>
    <text x="176" y="165" text-anchor="middle" fill="#2E3440" class="hex">#8FBCBB</text>
  </g>
  
  <!-- Light Mode Section -->
  <g transform="translate(290, 90)">
    <text x="110" y="0" text-anchor="middle" fill="#E5E9F0" class="mode-title">☀️ Light Mode</text>
    
    <!-- Background/Foreground -->
    <rect x="0" y="15" width="100" height="50" rx="6" fill="#FAFBFC" stroke="#D8DEE9"/>
    <text x="50" y="45" text-anchor="middle" fill="#2E3440" class="label">Background</text>
    <text x="50" y="58" text-anchor="middle" fill="#4C566A" class="hex">#FAFBFC</text>
    
    <rect x="110" y="15" width="100" height="50" rx="6" fill="#2E3440"/>
    <text x="160" y="45" text-anchor="middle" fill="#E5E9F0" class="label">Foreground</text>
    <text x="160" y="58" text-anchor="middle" fill="#81A1C1" class="hex">#2E3440</text>
    
    <!-- Syntax Colors Row 1 -->
    <rect x="0" y="75" width="65" height="45" rx="4" fill="#C41585"/>
    <text x="32" y="95" text-anchor="middle" fill="#FAFBFC" class="label">Pink</text>
    <text x="32" y="112" text-anchor="middle" fill="#FAFBFC" class="hex">#C41585</text>
    
    <rect x="72" y="75" width="65" height="45" rx="4" fill="#8839AA"/>
    <text x="104" y="95" text-anchor="middle" fill="#FAFBFC" class="label">Purple</text>
    <text x="104" y="112" text-anchor="middle" fill="#FAFBFC" class="hex">#8839AA</text>
    
    <rect x="144" y="75" width="65" height="45" rx="4" fill="#4D7028"/>
    <text x="176" y="95" text-anchor="middle" fill="#FAFBFC" class="label">Green</text>
    <text x="176" y="112" text-anchor="middle" fill="#FAFBFC" class="hex">#4D7028</text>
    
    <!-- Syntax Colors Row 2 -->
    <rect x="0" y="128" width="65" height="45" rx="4" fill="#2D6299"/>
    <text x="32" y="148" text-anchor="middle" fill="#FAFBFC" class="label">Blue</text>
    <text x="32" y="165" text-anchor="middle" fill="#FAFBFC" class="hex">#2D6299</text>
    
    <rect x="72" y="128" width="65" height="45" rx="4" fill="#8A6000"/>
    <text x="104" y="148" text-anchor="middle" fill="#FAFBFC" class="label">Yellow</text>
    <text x="104" y="165" text-anchor="middle" fill="#FAFBFC" class="hex">#8A6000</text>
    
    <rect x="144" y="128" width="65" height="45" rx="4" fill="#1D7A78"/>
    <text x="176" y="148" text-anchor="middle" fill="#FAFBFC" class="label">Cyan</text>
    <text x="176" y="165" text-anchor="middle" fill="#FAFBFC" class="hex">#1D7A78</text>
  </g>
  
  <!-- Sepia Mode Section -->
  <g transform="translate(550, 90)">
    <text x="110" y="0" text-anchor="middle" fill="#E5E9F0" class="mode-title">📜 Sepia Mode</text>
    
    <!-- Background/Foreground -->
    <rect x="0" y="15" width="100" height="50" rx="6" fill="#F5F0E6" stroke="#E5DFD5"/>
    <text x="50" y="45" text-anchor="middle" fill="#3B3228" class="label">Background</text>
    <text x="50" y="58" text-anchor="middle" fill="#5A5045" class="hex">#F5F0E6</text>
    
    <rect x="110" y="15" width="100" height="50" rx="6" fill="#3B3228"/>
    <text x="160" y="45" text-anchor="middle" fill="#F5F0E6" class="label">Foreground</text>
    <text x="160" y="58" text-anchor="middle" fill="#A09080" class="hex">#3B3228</text>
    
    <!-- Syntax Colors Row 1 -->
    <rect x="0" y="75" width="65" height="45" rx="4" fill="#B52080"/>
    <text x="32" y="95" text-anchor="middle" fill="#F5F0E6" class="label">Pink</text>
    <text x="32" y="112" text-anchor="middle" fill="#F5F0E6" class="hex">#B52080</text>
    
    <rect x="72" y="75" width="65" height="45" rx="4" fill="#7B3399"/>
    <text x="104" y="95" text-anchor="middle" fill="#F5F0E6" class="label">Purple</text>
    <text x="104" y="112" text-anchor="middle" fill="#F5F0E6" class="hex">#7B3399</text>
    
    <rect x="144" y="75" width="65" height="45" rx="4" fill="#4A6A28"/>
    <text x="176" y="95" text-anchor="middle" fill="#F5F0E6" class="label">Green</text>
    <text x="176" y="112" text-anchor="middle" fill="#F5F0E6" class="hex">#4A6A28</text>
    
    <!-- Syntax Colors Row 2 -->
    <rect x="0" y="128" width="65" height="45" rx="4" fill="#2E5E8A"/>
    <text x="32" y="148" text-anchor="middle" fill="#F5F0E6" class="label">Blue</text>
    <text x="32" y="165" text-anchor="middle" fill="#F5F0E6" class="hex">#2E5E8A</text>
    
    <rect x="72" y="128" width="65" height="45" rx="4" fill="#806000"/>
    <text x="104" y="148" text-anchor="middle" fill="#F5F0E6" class="label">Yellow</text>
    <text x="104" y="165" text-anchor="middle" fill="#F5F0E6" class="hex">#806000</text>
    
    <rect x="144" y="128" width="65" height="45" rx="4" fill="#1A6B69"/>
    <text x="176" y="148" text-anchor="middle" fill="#F5F0E6" class="label">Cyan</text>
    <text x="176" y="165" text-anchor="middle" fill="#F5F0E6" class="hex">#1A6B69</text>
  </g>
  
  <!-- Code Preview Section -->
  <g transform="translate(30, 310)">
    <text x="370" y="0" text-anchor="middle" fill="#E5E9F0" class="mode-title">Code Preview - Dark Mode</text>
    
    <!-- Code block background -->
    <rect x="0" y="15" width="740" height="180" rx="8" fill="#2E3440"/>
    
    <!-- Code content -->
    <text x="20" y="45" fill="#A3BE8C" font-family="monospace" font-size="13">// Alchemist's Orchid v2.0 - Astigmatism Optimized</text>
    <text x="20" y="70" font-family="monospace" font-size="13">
      <tspan fill="#C89BD0">function</tspan>
      <tspan fill="#81A1C1"> alchemize</tspan>
      <tspan fill="#E5E9F0">(essence) {</tspan>
    </text>
    <text x="20" y="95" font-family="monospace" font-size="13">
      <tspan fill="#E5E9F0">  </tspan>
      <tspan fill="#C89BD0">const</tspan>
      <tspan fill="#8FBCBB"> MAGIC_CONSTANT</tspan>
      <tspan fill="#E5E9F0"> = </tspan>
      <tspan fill="#DFCA9A">42</tspan>
      <tspan fill="#E5E9F0">;</tspan>
    </text>
    <text x="20" y="120" font-family="monospace" font-size="13">
      <tspan fill="#E5E9F0">  </tspan>
      <tspan fill="#C89BD0">let</tspan>
      <tspan fill="#E5E9F0"> result = </tspan>
      <tspan fill="#E8A4CC">"transformed"</tspan>
      <tspan fill="#E5E9F0">;</tspan>
    </text>
    <text x="20" y="145" fill="#A3BE8C" font-family="monospace" font-size="13">  // Mystic transformation</text>
    <text x="20" y="170" font-family="monospace" font-size="13">
      <tspan fill="#E5E9F0">  </tspan>
      <tspan fill="#C89BD0">return</tspan>
      <tspan fill="#E5E9F0"> { status: </tspan>
      <tspan fill="#8FBCBB">true</tspan>
      <tspan fill="#E5E9F0">, value: result };</tspan>
    </text>
    <text x="20" y="195" fill="#E5E9F0" font-family="monospace" font-size="13">}</text>
  </g>
  
  <!-- Accessibility Badge -->
  <g transform="translate(30, 520)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="#3B4252"/>
    <text x="100" y="25" text-anchor="middle" fill="#A3BE8C" class="label" font-size="12">✓ WCAG AA Compliant</text>
    <text x="100" y="45" text-anchor="middle" fill="#E5E9F0" class="hex">All modes pass accessibility standards</text>
  </g>
  
  <!-- Key Changes Badge -->
  <g transform="translate(250, 520)">
    <rect x="0" y="0" width="280" height="60" rx="8" fill="#3B4252"/>
    <text x="140" y="25" text-anchor="middle" fill="#E8A4CC" class="label" font-size="12">🌸 Pink Saturation: 100% → 60%</text>
    <text x="140" y="45" text-anchor="middle" fill="#E5E9F0" class="hex">Reduced halation for astigmatism users</text>
  </g>
  
  <!-- Research Badge -->
  <g transform="translate(550, 520)">
    <rect x="0" y="0" width="220" height="60" rx="8" fill="#3B4252"/>
    <text x="110" y="25" text-anchor="middle" fill="#C89BD0" class="label" font-size="12">💜 Color Psychology</text>
    <text x="110" y="45" text-anchor="middle" fill="#E5E9F0" class="hex">Research-backed anxiety reduction</text>
  </g>
</svg>
